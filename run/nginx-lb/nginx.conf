worker_processes auto;

error_log logs/error.log warn;
pid logs/nginx.pid;

events {
    worker_connections 65535;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" rt=$request_time urt=$upstream_response_time';

    access_log logs/access.log main;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;

    keepalive_timeout 65;
    keepalive_requests 10000;

    client_body_timeout 10s;
    client_header_timeout 10s;
    send_timeout 10s;

    # Use maps to control connection header with keepalive upstreams.
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    upstream seckill_proxy_backend {
        least_conn;
        keepalive 512;
        server 192.168.32.131:8080 max_fails=1 fail_timeout=5s;    }

    server {
        listen 18080;
        server_name _;

        location = /healthz {
            access_log off;
            return 200 'ok';
        }

        location / {
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 1s;
            proxy_send_timeout 10s;
            proxy_read_timeout 10s;
            proxy_next_upstream error timeout http_502 http_503 http_504;
            proxy_next_upstream_tries 3;
            proxy_pass http://seckill_proxy_backend;
        }
    }
}
